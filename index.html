<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    const iosLink = "https://apps.apple.com/eg/app/wsslini-girls-drive-girls/id1450930272";
    const androidLink = "https://play.google.com/store/apps/details?id=sa.com.almeny.al.kharj.client";
    const fallbackLink = "https://play.google.com/store/apps/details?id=sa.com.almeny.al.kharj.client";

    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

    if (/iPhone|iPad|iPod/i.test(userAgent)) {
      window.location.href = iosLink;
    } else if (/Android/i.test(userAgent)) {
      window.location.href = androidLink;
    } else {
      window.location.href = fallbackLink;
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
